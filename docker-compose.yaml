version: '3'
services:
  frontend:
    build:
      # Use the current directory as the build context
      # This allows us to access the files in the current directory inside the Dockerfile
      context: ./
      dockerfile: ./frontend/Dockerfile
    ports:
      # Expose a configurable host port for the frontend (default: 8082)
      # Access the application at http://localhost:${FRONTEND_PORT:-8082}
      - "${FRONTEND_PORT:-8082}:80"
    volumes:
      # Mount the frontend directory
      - ./frontend/src:/usr/share/nginx/html
  orchestrator:
    build:
      # Use the current directory as the build context
      # This allows us to access the files in the current directory inside the Dockerfile
      context: ./
      # Use the Dockerfile in the orchestrator directory
      dockerfile: ./orchestrator/Dockerfile
    ports:
      # Expose a configurable host port for orchestrator (default: 18081)
      - ${ORCHESTRATOR_PORT:-18081}:5000
      - ${ORCHESTRATOR_DEBUG_PORT:-5680}:5678
    environment:
      # Pass the environment variables to the container
      # The PYTHONUNBUFFERED environment variable ensures that the output from the application is logged to the console
      - PYTHONUNBUFFERED=TRUE
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the orchestrator directory to see how this is used
      - PYTHONFILE=/app/orchestrator/src/app.py
      - PYTHONPATH=/app
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      # Mount the utils directory in the current directory to the /app/utils directory in the container
      - ./utils:/app/utils
      # Mount the orchestrator/src directory in the current directory to the /app/orchestrator/src directory in the container
      - ./orchestrator/src:/app/orchestrator/src
    depends_on:
      - order_queue
  fraud_detection:
    build:
      # Use the current directory as the build context
      # This allows us to access the files in the current directory inside the Dockerfile
      context: ./
      # Use the Dockerfile in the fraud_detection directorys
      dockerfile: ./fraud_detection/Dockerfile
    ports:
      - ${FRAUD_DETECTION_DEBUG_PORT:-5681}:5678
    environment:
      # Pass the environment variables to the container
      # The PYTHONUNBUFFERED environment variable ensures that the output from the application is logged to the console
      - PYTHONUNBUFFERED=TRUE
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the fraud_detection directory to see how this is used
      - PYTHONFILE=/app/fraud_detection/src/app.py
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      # Mount the utils directory in the current directory to the /app/utils directory in the container
      - ./utils:/app/utils
      # Mount the fraud_detection/src directory in the current directory to the /app/fraud_detection/src directory in the container
      - ./fraud_detection/src:/app/fraud_detection/src
  transaction_verification:
    build:
      # Use the current directory as the build context
      # This allows us to access the files in the current directory inside the Dockerfile
      context: ./
      # Use the Dockerfile in the transaction_verification directory
      dockerfile: ./transaction_verification/Dockerfile
    ports:
      - ${TRANSACTION_VERIFICATION_DEBUG_PORT:-5682}:5678
    environment:
      # Pass the environment variables to the container
      # The PYTHONUNBUFFERED environment variable ensures that the output from the application is logged to the console
      - PYTHONUNBUFFERED=TRUE
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the transaction_verification directory to see how this is used
      - PYTHONFILE=/app/transaction_verification/src/app.py
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      # Mount the utils directory in the current directory to the /app/utils directory in the container
      - ./utils:/app/utils
      # Mount the transaction_verification/src directory in the current directory to the /app/transaction_verification/src directory in the container
      - ./transaction_verification/src:/app/transaction_verification/src
  suggestions:
    build:
      # Use the current directory as the build context
      # This allows us to access the files in the current directory inside the Dockerfile
      context: ./
      # Use the Dockerfile in the suggestions directory
      dockerfile: ./suggestions/Dockerfile
    ports:
      - ${SUGGESTIONS_DEBUG_PORT:-5683}:5678
    environment:
      # Pass the environment variables to the container
      # The PYTHONUNBUFFERED environment variable ensures that the output from the application is logged to the console
      - PYTHONUNBUFFERED=TRUE
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the suggestions directory to see how this is used
      - PYTHONFILE=/app/suggestions/src/app.py
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      # Mount the utils directory in the current directory to the /app/utils directory in the container
      - ./utils:/app/utils
      # Mount the suggestions/src directory in the current directory to the /app/suggestions/src directory in the container
      - ./suggestions/src:/app/suggestions/src

  order_queue:
    build:
      context: ./
      dockerfile: ./order_queue/Dockerfile
    ports:
      - ${ORDER_QUEUE_DEBUG_PORT:-5684}:5678
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_queue/src/app.py
      - PYTHONPATH=/app
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      - ./utils:/app/utils
      - ./order_queue/src:/app/order_queue/src

  order_executor_1:
    build:
      context: ./
      dockerfile: ./order_executor/Dockerfile
    ports:
      - ${ORDER_EXECUTOR_1_DEBUG_PORT:-5685}:5678
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_executor/src/app.py
      - PYTHONPATH=/app
      - EXECUTOR_ID=executor-1
      - ORDER_QUEUE_ADDR=order_queue:50060
      - DB_PRIMARY_ADDR=books_database_primary:50054
      - PAYMENT_ADDR=payment_system:50055
      - EXECUTOR_PORT=50070
      - EXECUTOR_COMMIT_DELAY=${EXECUTOR_COMMIT_DELAY:-0}
      - LEASE_SECONDS=2
      - POLL_SECONDS=1
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    depends_on:
      - order_queue
      - books_database_primary
      - payment_system
    volumes:
      - ./utils:/app/utils
      - ./order_executor/src:/app/order_executor/src

  order_executor_2:
    build:
      context: ./
      dockerfile: ./order_executor/Dockerfile
    ports:
      - ${ORDER_EXECUTOR_2_DEBUG_PORT:-5686}:5678
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_executor/src/app.py
      - PYTHONPATH=/app
      - EXECUTOR_ID=executor-2
      - ORDER_QUEUE_ADDR=order_queue:50060
      - DB_PRIMARY_ADDR=books_database_primary:50054
      - PAYMENT_ADDR=payment_system:50055
      - EXECUTOR_PORT=50071
      - EXECUTOR_COMMIT_DELAY=${EXECUTOR_COMMIT_DELAY:-0}
      - LEASE_SECONDS=2
      - POLL_SECONDS=1
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    depends_on:
      - order_queue
      - books_database_primary
      - payment_system
    volumes:
      - ./utils:/app/utils
      - ./order_executor/src:/app/order_executor/src

  books_database_primary:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    ports:
      - "50054:50054"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - DB_ROLE=primary
      - BACKUP_ADDRS=books_database_backup_1:50054,books_database_backup_2:50054
    depends_on:
      - books_database_backup_1
      - books_database_backup_2
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src

  books_database_backup_1:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - DB_ROLE=backup
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src

  books_database_backup_2:
    build:
      context: ./
      dockerfile: ./books_database/Dockerfile
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/books_database/src/app.py
      - PYTHONPATH=/app
      - DB_ROLE=backup
    volumes:
      - ./utils:/app/utils
      - ./books_database/src:/app/books_database/src

  payment_system:
    build:
      context: ./
      dockerfile: ./payment_system/Dockerfile
    ports:
      - ${PAYMENT_DEBUG_PORT:-5687}:5678
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/payment_system/src/app.py
      - PYTHONPATH=/app
      - PAYMENT_PORT=50055
      - DEBUGPY_ENABLED=FALSE
      - DEBUGPY_PORT=5678
      - DEBUGPY_WAIT_FOR_CLIENT=FALSE
    volumes:
      - ./utils:/app/utils
      - ./payment_system/src:/app/payment_system/src
