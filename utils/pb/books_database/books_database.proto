syntax = "proto3";

package books;

service BooksDatabase {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc Prepare (PrepareRequest) returns (PrepareResponse);
    rpc Commit (CommitRequest) returns (CommitResponse);
    rpc Abort (AbortRequest) returns (AbortResponse);
}

message ReadRequest {
    string title = 1;
}

message ReadResponse {
    int32 stock = 1;
}

message WriteRequest {
    string title = 1;
    int32 new_stock = 2;
    // BONUS: Compare-And-Swap validation
    int32 expected_stock = 3; 
    // Flag to tell backups this is an internal sync, not a client request
    bool is_replica_sync = 4; 
}

message WriteResponse {
    bool success = 1;
    string message = 2;
}

message PrepareRequest {
    string order_id = 1;
    repeated string items = 2;
    bool is_replica_sync = 3;
}

message PrepareResponse {
    bool ready = 1;
    string message = 2;
}

message CommitRequest {
    string order_id = 1;
    bool is_replica_sync = 2;
}

message CommitResponse {
    bool success = 1;
    string message = 2;
}

message AbortRequest {
    string order_id = 1;
    bool is_replica_sync = 2;
}

message AbortResponse {
    bool aborted = 1;
    string message = 2;
}
