syntax = "proto3";

package suggestions;

service SuggestionsService {
  rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
  rpc GenerateSuggestions (EventRequest) returns (SuggestionsResponse);
  rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message VectorClock {
  map<string, int32> clock = 1;
}

message InitOrderRequest {
  string order_id = 1;
  string user_id = 2;
  repeated string purchased_items = 3;
  VectorClock vector_clock = 4;
}

message InitOrderResponse {
  bool success = 1;
  string message = 2;
  VectorClock vector_clock = 3;
}

message EventRequest {
  string order_id = 1;
  VectorClock vector_clock = 2;
}

message ClearOrderRequest {
  string order_id = 1;
  VectorClock final_vector_clock = 2;
}

message ClearOrderResponse {
  bool success = 1;
  string message = 2;
  VectorClock vector_clock = 3;
}

message Book {
  string book_id = 1;
  string title = 2;
  string author = 3;
}

message SuggestionsResponse {
  bool ok = 1;
  string message = 2;
  repeated Book suggested_books = 3;
  VectorClock vector_clock = 4;
}
